name: KB error or feedback
description: Flag something wrong, stale, or missing in the knowledge base — or suggest an improvement.
title: "[kb] "
labels: ["kb-feedback"]
# NOTE: generated by scripts/gen_issue_form.py — the "Specific item" options are
# rebuilt from the corpus after each ingest batch. Edit the script, not this file.
body:
  - type: markdown
    attributes:
      value: |
        Thanks for improving the KB. For a quick fix you can edit the page directly (open a PR) — use this for things you can't fix yourself, or to flag for the owner.
  - type: dropdown
    id: kind
    attributes:
      label: Type
      options:
        - Error — a fact/number/trigger is wrong
        - Stale — out of date (newer framework version, changed code)
        - Missing — a framework/pipeline/app/fact that should be here isn't
        - Suggestion — structure, schema, or workflow improvement
        - Question
    validations:
      required: true
  - type: dropdown
    id: content_type
    attributes:
      label: Content type
      description: Which part of the KB is this about?
      options:
        - framework
        - pipeline
        - app
        - analysis
        - method
        - infrastructure / deployment
        - catalog / index
        - schema / conventions
        - other / general
    validations:
      required: true
  - type: dropdown
    id: item
    attributes:
      label: Specific item
      description: The exact page, if it's about one (type-prefixed). Pick "general" if not page-specific, or "other / not listed" if missing.
      options:
        - "— general / not page-specific —"
        - "framework · afg-drought"
