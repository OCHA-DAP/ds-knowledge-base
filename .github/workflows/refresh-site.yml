name: Refresh public site

# The public site + catalog encode TIME-RELATIVE state that goes stale on its own:
#   * which frameworks are "currently being monitored" (this month ∈ monitoring_period.months)
#     → the green ring on the map;
#   * the computed lifecycle (recently-triggered / expired) which depends on today's date.
# Nothing edits the source pages, but the rendered output drifts as the calendar turns —
# so regenerate monthly (and on demand) and commit the artifacts back. Generated, so it
# auto-commits. Activation/endorsement edits still trigger a fresh render via capture-as-you-go.

on:
  schedule:
    - cron: "0 6 1 * *"   # 06:00 UTC on the 1st of each month
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install pyyaml

      - name: Regenerate catalog + framework READMEs + public site
        run: |
          python scripts/gen_catalog.py
          python scripts/gen_framework_readmes.py
          python scripts/gen_public_site.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add catalog.md public-site/index.html frameworks/*/README.md
          if git diff --staged --quiet; then
            echo "site already current — nothing to commit"
          else
            git commit -m "chore: refresh public site for $(date -u '+%Y-%m') (monitoring + lifecycle) [skip ci]"
            git push
          fi
