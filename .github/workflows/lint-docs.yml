name: Lint docs (link check)

# Builds the MkDocs site with --strict, which turns the `validation:` warnings in
# mkdocs.yml (broken internal links, missing anchors, unrecognized refs) into ERRORS.
# This is the CI link check: it catches a broken link in a PR before it reaches the
# published site. It does NOT deploy — site.yml owns publishing and stays resilient,
# so a broken link fails this check without blocking an unrelated deploy.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build-strict:
    runs-on: ubuntu-latest
    env:
      DISABLE_MKDOCS_2_WARNING: "true"   # the Material "MkDocs 2.0" notice is unrelated noise
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install MkDocs
        run: pip install --quiet mkdocs-material mkdocs-same-dir pymdown-extensions
      - name: Build with --strict (fails on broken links)
        run: mkdocs build --strict --site-dir /tmp/_lint_site
