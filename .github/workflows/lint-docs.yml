name: Lint docs (link check)

# The CI link check: flags a relative markdown link to a doc file that doesn't exist
# (scripts/check_links.py) — the class that hides real rot — so it's caught in a PR
# before it reaches main. Successor to the `mkdocs build --strict` check, which left
# with the MkDocs mirror site (D87); same single rule, no site build.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Check markdown links
        run: python scripts/check_links.py
