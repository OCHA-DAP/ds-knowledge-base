name: Publish AA site

# Publishes the standalone public Anticipatory Action site to GitHub Pages on every push
# to main. The KB itself has NO rendered mirror (D87 — the MkDocs mirror was removed; the
# GitHub interface is the browsing surface): the deploy is ONLY /anticipatory-action/
# plus a root redirect into it, so pre-D87 links to the site root still land somewhere.
# Requires the repo's Pages "Source" to be set to "GitHub Actions" (Settings → Pages).

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/configure-pages@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: pip install --quiet pyyaml
      - name: Regenerate served content from current pages (no-DB generators)
        # The site is deployed on every push to main, so generate the served artifacts HERE
        # from the live page frontmatter — that way the public AA map always reflects the
        # KB, instead of drifting until the monthly refresh-site run. These are pure
        # frontmatter→output (no DB/secrets). The DB-backed trigger-stats page
        # (activations.html) and aa_frameworks/ are NOT regenerated here — they're served
        # as committed and refreshed on their own cadence (trigger-stats.yml).
        run: |
          python scripts/gen_public_site.py       # index.html — the Leaflet status map
          python scripts/gen_global_site.py       # aa_global.html — cross-org map+table (separate page, D79)
          python scripts/gen_aa_site.py           # aa_index.html / aa_triggers.html — the shells
      - name: Assemble the Anticipatory Action site (/anticipatory-action/ + root redirect)
        run: |
          mkdir -p site/anticipatory-action
          cp index.html        site/anticipatory-action/map.html      # the Leaflet status map
          cp activations.html  site/anticipatory-action/stats.html    # the trigger statistics page
          cp aa_index.html     site/anticipatory-action/index.html    # shell: nav + map iframe
          cp aa_triggers.html  site/anticipatory-action/triggers.html # shell: nav + stats iframe
          cp -r aa_frameworks  site/anticipatory-action/frameworks    # per-framework pages (committed, DB-backed like stats)
          cp aa_global_view.html site/anticipatory-action/global.html # shell: nav + all-orgs iframe (D79)
          cp aa_global.html    site/anticipatory-action/global-map.html # the cross-org map+table content
          printf '%s\n' '<!doctype html><html lang="en"><meta charset="utf-8"><meta http-equiv="refresh" content="0; url=anticipatory-action/"><link rel="canonical" href="anticipatory-action/"><title>OCHA Anticipatory Action Frameworks</title><a href="anticipatory-action/">OCHA Anticipatory Action Frameworks</a></html>' > site/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
