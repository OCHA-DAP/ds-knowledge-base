name: KB steward (Claude, Max plan)

# The KB's single human entry point AND the resolver for judgment-shaped automated issues.
#
# THE SIMPLE STORY (for the team): want to change or add something in the KB? Open an issue describing
# it. The steward reads the issue + its full comment thread and drafts the change as a review PR — or,
# if it needs a decision/source it doesn't have, comments asking for it. You review and merge; it NEVER
# auto-merges. Comment the answer on the issue and the next run updates the same PR.
#
# WHAT IT PICKS UP:
#   - ANY issue opened/commented by a team member (write/admin) — no label needed (the human front door);
#   - automated issues that need judgment: kb-feedback, kb-validity, kb-new-repos, kb-coverage,
#     kb-aa-watch, kb-docs, and the kb-autofix label.
# WHAT IT DOESN'T: deterministic re-syncs (kb-drift / kb-pdf-freshness / kb-infra-drift) go straight to a
#   kb-ingest PR, not here. And `discuss` / `no-autofix` / `wontfix` opt an issue OUT (pure conversation).
#
# SECURITY (issue text is partly untrusted input to an LLM agent with Bash + web):
#   - TRUST GATE: only engages on a trusted trigger — a maintainer comment, a manual dispatch, or an
#     `issues` event whose author is a team member or our own automation bot. A random person filing the
#     public feedback form does NOT auto-engage it (a maintainer must comment / add `kb-autofix`).
#   - LEAST PRIVILEGE: holds only the repo-scoped App token (no personal PAT, no cross-repo reach, no
#     `workflows` permission). resolve_issue.py scrubs every GH token from the Claude subprocess and the
#     checkout doesn't persist credentials, so an injected agent can't read or exfiltrate a write token.
#   - BLAST RADIUS: edits under `.github/` and `scripts/` are reverted before the PR; nothing auto-merges.
#
# Triggers: issue opened/labeled · maintainer comment · daily sweep · manual. NEVER runs on pull_request.

on:
  schedule:
    - cron: "0 5 * * *"      # daily 05:00 UTC — sweep the open backlog
  workflow_dispatch:
    inputs:
      issue: { description: "single issue # (blank = sweep open issues)", required: false, default: "" }
      model: { description: "Claude model", required: false, default: "opus" }
  issues:
    types: [opened, labeled]
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: kb-steward-${{ github.event.issue.number || github.event.inputs.issue || 'sweep' }}
  cancel-in-progress: false

jobs:
  steward:
    # Only act on a comment when it's by a MAINTAINER on a real issue (not a PR, not our own bot, not the
    # steward's own no-op marker). Other events (schedule / dispatch / issues) proceed; the per-issue
    # `should_handle` gate below decides whether to actually engage Claude.
    if: >
      github.event_name != 'issue_comment' ||
      (github.event.issue.pull_request == null &&
       github.event.comment.user.login != 'github-actions[bot]' &&
       !contains(github.event.comment.body, 'kb-autofix-noop') &&
       (github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'COLLABORATOR'))
    runs-on: ubuntu-latest
    env:
      MODEL: ${{ github.event.inputs.model || 'opus' }}
      MAX_SWEEP: "5"
      GH_REPO: ${{ github.repository }}
      # Detector issues that need JUDGMENT (deterministic re-syncs go to kb-ingest, not here).
      LABELS_OK: "kb-autofix kb-feedback kb-docs kb-validity kb-coverage kb-new-repos kb-aa-watch"
      # Opt OUT: pure discussion / explicitly hands-off.
      EXCLUDE: "wontfix no-autofix discuss"
      HAS_CLAUDE: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN != '' }}
      HAS_APP: ${{ secrets.KB_BOT_APP_ID != '' }}
      # SECURITY — trust gate inputs (from the event payload; no API call needed). Untrusted issue
      # content drives an LLM agent, so it only engages on a TRUSTED trigger (see trusted_trigger below).
      EVENT: ${{ github.event_name }}
      ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
      ISSUE_AUTHOR_ASSOC: ${{ github.event.issue.author_association }}
      # Reads only (issues/labels). NOT the personal PAT — the steward must never hold a token that
      # reaches beyond THIS repo. The push/PR use the repo-scoped App token (minted below); github.token
      # is the read fallback. (No INGEST_GH_PAT here on purpose — it's all-repos + workflow scope.)
      GH_TOKEN: ${{ github.token }}
    steps:
      # Bot identity that still triggers CI (see kb-ingest.yml for the rationale). Skipped → falls back
      # to the PAT, then GITHUB_TOKEN, until KB_BOT_APP_* are set.
      - name: Mint GitHub App token (bot identity that triggers CI)
        if: env.HAS_APP == 'true'
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.KB_BOT_APP_ID }}
          private-key: ${{ secrets.KB_BOT_APP_PRIVATE_KEY }}
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token || github.token }}
          # SECURITY: do NOT persist the token into .git/config — otherwise the Claude subprocess (Bash)
          # could read it from there even with a scrubbed env. The push step re-supplies it explicitly.
          persist-credentials: false
      - uses: actions/setup-python@v6
        with: { python-version: "3.12" }
      - run: pip install --quiet pyyaml

      - name: Resolve issue(s) → PR
        if: env.HAS_CLAUDE == 'true'
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # App token (repo-scoped, bot) so comments/labels/PR are bot-attributed and CI runs; github.token
          # fallback. resolve_issue.py SCRUBS this from the Claude subprocess — only the shell push/PR see it.
          GH_TOKEN: ${{ steps.app-token.outputs.token || github.token }}
        run: |
          npm install -g @anthropic-ai/claude-code >/dev/null 2>&1
          git config user.name "ds-kb steward"
          git config user.email "actions@users.noreply.github.com"
          BASE="${{ github.event.repository.default_branch }}"

          is_our_bot() {   # $1 = login → 0 if it's OUR automation (detector-filed issues are trusted)
            case "$1" in "github-actions[bot]"|"chd-ds-kb-bot[bot]") return 0 ;; *) return 1 ;; esac
          }
          excluded() {   # $1 = issue → 0 if opted out (discuss/no-autofix/wontfix)
            labels=$(gh issue view "$1" --json labels --jq '.labels[].name' 2>/dev/null)
            for x in $EXCLUDE; do echo "$labels" | grep -qx "$x" && return 0; done
            return 1
          }
          has_judgment_label() {   # $1 = issue → 0 if it carries a judgment label
            labels=$(gh issue view "$1" --json labels --jq '.labels[].name' 2>/dev/null)
            for e in $LABELS_OK; do echo "$labels" | grep -qx "$e" && return 0; done
            return 1
          }
          # SECURITY GATE — only engage on a TRUSTED trigger, since the issue content is partly untrusted
          # input to an LLM agent. Trusted = a maintainer comment (already enforced by the job-level `if`),
          # a manual dispatch (needs Actions-write), or an `issues` event whose ISSUE AUTHOR is a team
          # member (OWNER/MEMBER/COLLABORATOR) or OUR own automation bot. A random person filing the public
          # feedback form (even though the template auto-adds `kb-feedback`) is NOT trusted → a maintainer
          # must vouch (comment, or add `kb-autofix`) before the steward will act.
          trusted_trigger() {
            case "$EVENT" in
              issue_comment|workflow_dispatch) return 0 ;;
              issues)
                is_our_bot "$ISSUE_AUTHOR" && return 0
                case "$ISSUE_AUTHOR_ASSOC" in OWNER|MEMBER|COLLABORATOR) return 0 ;; esac
                return 1 ;;
              *) return 1 ;;
            esac
          }

          # --- pick targets ---
          SINGLE=""
          case "$EVENT" in
            issue_comment|issues) SINGLE="${{ github.event.issue.number }}" ;;
            workflow_dispatch)    SINGLE="${{ github.event.inputs.issue }}" ;;
          esac

          TARGETS=""
          if [ -n "$SINGLE" ]; then
            trusted_trigger || { echo "trigger not from a team member / our automation — skipping #$SINGLE"; exit 0; }
            excluded "$SINGLE" && { echo "#$SINGLE opted out (discuss/no-autofix/wontfix) — skipping"; exit 0; }
            TARGETS="$SINGLE"
          else
            # Daily SWEEP: only re-chase OUR automation's labelled judgment issues (the backlog). Team
            # members' free-form issues are handled on open/comment, not re-swept (no Opus churn on stale
            # threads); a public issue is never swept — it needs a maintainer to vouch first.
            for n in $(gh issue list --state open --limit 100 --json number --jq '.[].number'); do
              excluded "$n" && continue
              has_judgment_label "$n" || continue
              author=$(gh issue view "$n" --json author --jq '.author.login' 2>/dev/null)
              is_our_bot "$author" || continue
              # skip issues that already have an open autofix PR (a maintainer comment re-runs them)
              [ -n "$(gh pr list --head "kb-autofix/issue-$n" --state open --json number --jq '.[0].number')" ] && continue
              TARGETS="$TARGETS $n"
            done
          fi
          TARGETS=$(echo $TARGETS | tr ' ' '\n' | grep . | head -n "$MAX_SWEEP")
          [ -n "$TARGETS" ] || { echo "nothing in scope"; exit 0; }
          FORCE="false"; [ -n "$SINGLE" ] && FORCE="true"   # explicit request → comment when nothing to do
          echo "targets:" $TARGETS

          for N in $TARGETS; do
            echo "::group::issue #$N"
            branch="kb-autofix/issue-$N"
            git checkout -B "$branch" "origin/$BASE" >/dev/null 2>&1
            git reset --hard "origin/$BASE" >/dev/null 2>&1; git clean -fd >/dev/null 2>&1
            python scripts/resolve_issue.py --issue "$N" --model "$MODEL" || true
            # SECURITY: never let an issue-driven edit touch CI or the steward's own machinery. Revert any
            # changes under .github/ and scripts/ (the App token also lacks 'workflows' permission, so a
            # workflow push would be rejected anyway — this is belt-and-braces, and also guards scripts/).
            git checkout -q -- .github scripts 2>/dev/null || true
            git clean -fdq -- .github scripts 2>/dev/null || true
            if [ -n "$(git status --porcelain)" ]; then
              title=$(gh issue view "$N" --json title --jq .title)
              git add -A
              git commit -q -m "kb-autofix: resolve #$N — $title (Claude, Max plan)"
              # explicit auth (checkout used persist-credentials:false); App token, never exposed to Claude
              git push -f "https://x-access-token:${GH_TOKEN}@github.com/${GH_REPO}.git" "$branch"
              if [ -z "$(gh pr list --head "$branch" --state open --json number --jq '.[0].number')" ]; then
                gh label create kb-autofix --color 0E8A16 --description "Claude-drafted issue fix awaiting review" 2>/dev/null || true
                gh pr create --base "$BASE" --head "$branch" --label kb-autofix \
                  --title "kb-autofix: #$N — $title" \
                  --body "Drafted by the KB steward (headless Claude, Max plan) from #$N and its comment thread. **Review before merging** — verify the change against the cited source. Re-comment the correction on #$N and the next run updates this PR. Closes #$N" \
                  || echo "::warning::pr create failed for #$N"
                echo "opened PR for #$N"
              else
                echo "updated existing PR for #$N"
              fi
            else
              echo "no confident fix for #$N — left for a human"
              if [ "$FORCE" = "true" ]; then
                marker="<!-- kb-autofix-noop -->"
                if ! gh issue view "$N" --json comments --jq '.comments[].body' | grep -qF "$marker"; then
                  gh issue comment "$N" --body "$marker 🤖 Thanks — I read this but can't make a confident, source-backed change yet. If it's a correction, point me to the authoritative source (framework PDF, repo code, a CERF/OCHA page); if it needs a decision, just say which way. Comment here and I'll pick it up on the next run." || true
                fi
              fi
            fi
            git checkout -q "$BASE" 2>/dev/null || git checkout -q -B "$BASE" "origin/$BASE"
            echo "::endgroup::"
          done
