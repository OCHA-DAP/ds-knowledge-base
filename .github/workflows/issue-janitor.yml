name: KB issue janitor (Claude, Max plan)

# Generalises the kb-ingest fix loop to ARBITRARY issues: reads an eligible open issue + its full
# comment thread and lets headless Claude (Max plan) draft a fix → PR that closes it. People (and the
# detectors) file issues; this cleans them up. Comment the authoritative answer on an issue and the
# next run incorporates it (the whole thread is fed to Claude; the per-issue PR branch is force-updated).
# NEVER auto-merges — every fix is a human-reviewed PR. NEVER runs on pull_request.
#
# Triggers: daily sweep · manual (one issue or a sweep) · a maintainer comment on an eligible issue ·
# the `kb-autofix` label being added.

on:
  schedule:
    - cron: "0 5 * * *"      # daily 05:00 UTC
  workflow_dispatch:
    inputs:
      issue: { description: "single issue # (blank = sweep eligible open issues)", required: false, default: "" }
      model: { description: "Claude model", required: false, default: "opus" }
  issues:
    types: [labeled]
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: issue-janitor-${{ github.event.issue.number || github.event.inputs.issue || 'sweep' }}
  cancel-in-progress: false

jobs:
  janitor:
    # Only act on a comment when it's by a MAINTAINER on a real issue (not a PR, not our own bot).
    # Other events (schedule / dispatch / labeled) always proceed.
    if: >
      github.event_name != 'issue_comment' ||
      (github.event.issue.pull_request == null &&
       github.event.comment.user.login != 'github-actions[bot]' &&
       (github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'COLLABORATOR'))
    runs-on: ubuntu-latest
    env:
      MODEL: ${{ github.event.inputs.model || 'opus' }}
      MAX_SWEEP: "5"
      ELIGIBLE: "kb-autofix kb-feedback kb-drift kb-pdf-freshness kb-docs kb-validity kb-coverage kb-new-repos kb-aa-watch kb-infra-drift"
      EXCLUDE: "wontfix no-autofix"
      HAS_CLAUDE: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN != '' }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v5
        with: { fetch-depth: 0 }
      - uses: actions/setup-python@v6
        with: { python-version: "3.12" }
      - run: pip install --quiet pyyaml

      - name: Resolve eligible issue(s) → PR
        if: env.HAS_CLAUDE == 'true'
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          npm install -g @anthropic-ai/claude-code >/dev/null 2>&1
          git config user.name "ds-kb issue janitor"
          git config user.email "actions@users.noreply.github.com"
          BASE="${{ github.event.repository.default_branch }}"

          eligible() {   # $1 = issue number → 0 if it has an eligible label and no excluded one
            labels=$(gh issue view "$1" --json labels --jq '.labels[].name' 2>/dev/null)
            for x in $EXCLUDE;  do echo "$labels" | grep -qx "$x" && return 1; done
            for e in $ELIGIBLE; do echo "$labels" | grep -qx "$e" && return 0; done
            return 1
          }

          # --- pick targets ---
          SINGLE=""
          case "${{ github.event_name }}" in
            issue_comment|issues) SINGLE="${{ github.event.issue.number }}" ;;
            workflow_dispatch)    SINGLE="${{ github.event.inputs.issue }}" ;;
          esac

          TARGETS=""
          if [ -n "$SINGLE" ]; then
            eligible "$SINGLE" && TARGETS="$SINGLE" || { echo "#$SINGLE not eligible — skipping"; exit 0; }
          else
            for n in $(gh issue list --state open --limit 100 --json number --jq '.[].number'); do
              eligible "$n" || continue
              # sweep skips issues that already have an open autofix PR (a maintainer comment re-runs them)
              [ -n "$(gh pr list --head "kb-autofix/issue-$n" --state open --json number --jq '.[0].number')" ] && continue
              TARGETS="$TARGETS $n"
            done
          fi
          TARGETS=$(echo $TARGETS | tr ' ' '\n' | grep . | head -n "$MAX_SWEEP")
          [ -n "$TARGETS" ] || { echo "no eligible issues"; exit 0; }
          FORCE="false"; [ -n "$SINGLE" ] && FORCE="true"   # explicit request → comment on a no-op
          echo "targets:" $TARGETS

          for N in $TARGETS; do
            echo "::group::issue #$N"
            branch="kb-autofix/issue-$N"
            git checkout -B "$branch" "origin/$BASE" >/dev/null 2>&1
            git reset --hard "origin/$BASE" >/dev/null 2>&1; git clean -fd >/dev/null 2>&1
            python scripts/resolve_issue.py --issue "$N" --model "$MODEL" || true
            if [ -n "$(git status --porcelain)" ]; then
              title=$(gh issue view "$N" --json title --jq .title)
              git add -A
              git commit -q -m "kb-autofix: resolve #$N — $title (Claude, Max plan)"
              git push -f origin "$branch"
              if [ -z "$(gh pr list --head "$branch" --state open --json number --jq '.[0].number')" ]; then
                gh label create kb-autofix --color 0E8A16 --description "Claude-drafted issue fix awaiting review" 2>/dev/null || true
                gh pr create --base "$BASE" --head "$branch" --label kb-autofix \
                  --title "kb-autofix: #$N — $title" \
                  --body "Auto-drafted by the issue janitor (headless Claude, Max plan) from #$N and its comment thread. **Review before merging** — verify the change against the cited source. Re-comment the correction on #$N and the next run updates this PR. Closes #$N" \
                  || echo "::warning::pr create failed for #$N"
                echo "opened PR for #$N"
              else
                echo "updated existing PR for #$N"
              fi
            else
              echo "no confident fix for #$N — left for a human"
              if [ "$FORCE" = "true" ]; then
                marker="<!-- kb-autofix-noop -->"
                if ! gh issue view "$N" --json comments --jq '.comments[].body' | grep -qF "$marker"; then
                  gh issue comment "$N" --body "$marker 🤖 I looked at this but couldn't make a confident, source-backed fix yet. If it's an error, point me to the authoritative source (framework PDF, repo code, a CERF/OCHA page); if it needs a decision, say which way — then I'll apply it on the next run." || true
                fi
              fi
            fi
            git checkout -q "$BASE" 2>/dev/null || git checkout -q -B "$BASE" "origin/$BASE"
            echo "::endgroup::"
          done
