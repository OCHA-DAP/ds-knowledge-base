name: Pipeline registry & health

# Refreshes the authoritative prod-pipeline registry + live health
# (infrastructure/pipeline-registry.md + .pipeline-registry.json) by reading live
# Databricks job state + GitHub Actions run history. Generated reference → auto-commits.
# This is the supersede-target for the `pipelines-status` dashboard.
#
# REQUIREMENTS to make this run (one-time setup):
#   1. Databricks auth — a SERVICE PRINCIPAL or PAT (the interactive `databricks auth
#      login` token expires and won't work in CI). Add repo/org secrets:
#        DATABRICKS_HOST  (e.g. https://adb-6009046713167663.3.azuredatabricks.net)
#        DATABRICKS_TOKEN (SP/PAT with jobs:read on the workspace)
#   2. Cross-repo GHA reads — `gh run list -R OCHA-DAP/<other-repo>` needs a token with
#      `repo:read` (actions:read) across the org. The default GITHUB_TOKEN is scoped to
#      THIS repo only, so set `GH_TOKEN` to an org-read PAT (secret PIPELINE_REGISTRY_GH_PAT).
#   3. Some monitoring workflows live on non-default branches → they read UNKNOWN until
#      their path/branch is pinned in GHA_SEED. That's expected, not a failure.

on:
  schedule:
    - cron: "47 6 * * *"   # 06:47 UTC daily (after the DB snapshot)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  registry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
          databricks version

      - name: Generate registry + health
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          # Empty profile → the script omits `-p` so the CLI uses DATABRICKS_HOST/TOKEN env auth.
          DATABRICKS_PROFILE: ""
          GH_TOKEN: ${{ secrets.PIPELINE_REGISTRY_GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          python scripts/gen_pipeline_registry.py || echo "::warning::registry gen had errors (auth? — see logs)"

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add infrastructure/pipeline-registry.md infrastructure/.pipeline-registry.json
          if git diff --staged --quiet; then
            echo "no registry changes"
          else
            git commit -m "chore: refresh pipeline registry + health [skip ci]"
            git push
          fi
