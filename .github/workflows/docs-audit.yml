name: KB docs audit (Claude, Max plan)

# The JUDGMENT half of meta-doc maintenance (the mechanical half is check-docs.yml).
# Monthly, headless Claude reads the how-it-works docs and checks them against the
# actual repo state — shipped phases still marked todo, resolved "open questions",
# superseded rationale, stale Now/Next, dangling refs — fixes what's verifiably stale
# IN PLACE, and opens a PR for human review. It does NOT touch content pages and does
# NOT delete DESIGN decision-log history (that log is append-only).
#
# Same mechanism as kb-ingest / framework captions: `claude -p` on the Max plan
# (CLAUDE_CODE_OAUTH_TOKEN). NEVER on pull_request (keeps the token off fork PRs).

on:
  schedule:
    - cron: "0 6 1 * *"   # 06:00 UTC on the 1st of the month
  workflow_dispatch:
    inputs:
      model: { description: "Claude model", required: false, default: "opus" }

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: docs-audit
  cancel-in-progress: false

jobs:
  audit:
    runs-on: ubuntu-latest
    env:
      MODEL: ${{ github.event.inputs.model || 'opus' }}
      HAS_CLAUDE: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN != '' }}
      HAS_APP: ${{ secrets.KB_BOT_APP_ID != '' }}
      GH_REPO: ${{ github.repository }}
    steps:
      # Open the PR as the shared chd-ds-kb-bot (App token) — one bot everywhere + CI auto-runs.
      - name: Mint GitHub App token (bot identity that triggers CI)
        if: env.HAS_APP == 'true'
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.KB_BOT_APP_ID }}
          private-key: ${{ secrets.KB_BOT_APP_PRIVATE_KEY }}
      - uses: actions/checkout@v5
        with:
          token: ${{ steps.app-token.outputs.token || github.token }}
          # don't persist the token into .git/config — Claude's Bash runs in this workspace
          persist-credentials: false
      - uses: actions/setup-python@v6
        with: { python-version: "3.12" }
      - run: pip install --quiet pyyaml

      - name: Guard — token present
        run: |
          [ -n "${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}" ] || { echo "::warning::no CLAUDE_CODE_OAUTH_TOKEN — skipping"; exit 0; }

      - name: Refresh generated counts + collect mechanical findings
        if: env.HAS_CLAUDE == 'true'
        run: |
          python scripts/gen_doc_counts.py
          python scripts/check_docs.py --report docs-report.md || true   # exit 2 = findings; keep going

      - name: Claude audits the meta-docs (headless, Max plan)
        if: env.HAS_CLAUDE == 'true'
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          npm install -g @anthropic-ai/claude-code >/dev/null 2>&1
          claude -p "$(cat scripts/docs_audit_prompt.md)" \
            --allowedTools Read Edit Bash Grep Glob --model "$MODEL" \
            || echo "::warning::Claude audit step failed — opening PR with whatever (if anything) changed"

      - name: Open PR if the audit changed anything
        if: env.HAS_CLAUDE == 'true'
        env:
          # App token (bot) → github.token. Opens the PR as chd-ds-kb-bot so CI auto-runs.
          GH_TOKEN: ${{ steps.app-token.outputs.token || github.token }}
        run: |
          paths="README.md CLAUDE.md docs infrastructure/automation.md scripts/README.md"
          if [ -z "$(git status --porcelain $paths)" ]; then
            echo "no meta-doc changes — nothing to PR"; exit 0
          fi
          gh label create kb-docs --color 1D76DB --description "Meta-docs out of date (counts / refs / prose)" 2>/dev/null || true
          branch="kb-docs/audit-$(date -u '+%Y-%m')"
          git config user.name "ds-kb docs audit"
          git config user.email "actions@users.noreply.github.com"
          git checkout -b "$branch"
          git add $paths
          git commit -m "docs-audit: refresh how-it-works docs vs repo state (Claude, Max plan)"
          # explicit auth (checkout used persist-credentials:false); App token, never exposed to Claude
          git push -f "https://x-access-token:${GH_TOKEN}@github.com/${GH_REPO}.git" "$branch"
          body="Monthly headless-Claude audit of the *how-it-works* docs against the actual repo state (stale phases/Now-Next, resolved open-questions, dangling refs, regenerated counts). Content pages and the DESIGN decision-log history are untouched. Review the diff and merge."
          gh pr create --title "KB docs audit ($(date -u '+%Y-%m'))" --body "$body" --label kb-docs \
            || echo "::warning::pr create failed (a docs-audit PR may already be open)"
