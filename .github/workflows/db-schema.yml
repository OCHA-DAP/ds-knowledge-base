name: DB schema snapshot

# Daily read-only snapshot of the Postgres schema -> infrastructure/db-schema.md
# (+ .db-tables.json), then regenerate the dependency graph (which wires the DB
# tables in) and commit both back. Generated reference, so it auto-commits.
#
# REQUIREMENTS to make this run (one-time setup):
#   1. DB secrets on this repo (or the org): DSCI_AZ_DB_PROD_HOST, DSCI_AZ_DB_PROD_UID,
#      DSCI_AZ_DB_PROD_PW  (read-only user is enough — introspection only).
#   2. The Azure Postgres firewall must allow the runner. GitHub-hosted runners have
#      dynamic IPs — either enable "Allow public access from Azure services", add a
#      rule, or switch `runs-on:` to the team's self-hosted runner (chd-github-runner).
#   3. ocha-stratus is private — installed from its GitHub source below. If that repo
#      is private, the default GITHUB_TOKEN can read same-org repos; otherwise add a PAT.

on:
  schedule:
    - cron: "41 6 * * *"   # 06:41 UTC daily
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          pip install pyyaml
          pip install "ocha-stratus @ git+https://github.com/OCHA-DAP/ocha-stratus.git" \
            || echo "::warning::ocha-stratus install failed — check repo access / privacy"

      - name: Introspect DB (prod + dev) + regenerate graph
        env:
          PGSSLMODE: require
          DSCI_AZ_DB_PROD_HOST: ${{ secrets.DSCI_AZ_DB_PROD_HOST }}
          DSCI_AZ_DB_PROD_UID: ${{ secrets.DSCI_AZ_DB_PROD_UID }}
          DSCI_AZ_DB_PROD_PW: ${{ secrets.DSCI_AZ_DB_PROD_PW }}
          DSCI_AZ_DB_DEV_HOST: ${{ secrets.DSCI_AZ_DB_DEV_HOST }}
          DSCI_AZ_DB_DEV_UID: ${{ secrets.DSCI_AZ_DB_DEV_UID }}
          DSCI_AZ_DB_DEV_PW: ${{ secrets.DSCI_AZ_DB_DEV_PW }}
        run: |
          python scripts/gen_db_schema.py --stage prod
          python scripts/gen_db_schema.py --stage dev
          python scripts/gen_dependency_graph.py   # graph uses the prod table list

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add infrastructure/db-schema.md infrastructure/db-schema-dev.md infrastructure/.db-tables.json infrastructure/.db-tables-dev.json infrastructure/dependency-graph.md
          if git diff --staged --quiet; then
            echo "no schema changes"
          else
            git commit -m "chore: refresh DB schema snapshot + dependency graph [skip ci]"
            git push
          fi
