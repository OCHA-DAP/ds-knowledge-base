name: KB discover — new org repos

# Discovery (not drift): sweep the ocha-dap org for repos that have APPEARED or disappeared since
# the last run, and maintain a `kb-new-repos` tracking issue (DS-team repos highlighted as ingest
# candidates). Advances the committed baseline so each run reports only the delta.
#
# Needs a token that can list the org. The default GITHUB_TOKEN lists PUBLIC org repos; to see new
# PRIVATE repos too, set DISCOVER_GH_PAT to an org repo:read PAT.

on:
  schedule:
    - cron: "27 7 * * 1"   # Mondays 07:27 UTC
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write

concurrency:
  group: discover-repos
  cancel-in-progress: false

jobs:
  sweep:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.DISCOVER_GH_PAT || secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with: { python-version: "3.12" }

      - name: Sweep org for new repos
        id: sweep
        continue-on-error: true   # exit 2 = new/removed repos found
        run: python scripts/check_new_repos.py --report repos-report.md --update-baseline

      - name: Open/update tracking issue
        if: steps.sweep.outcome == 'failure'
        run: |
          gh label create kb-new-repos --color 0E8A16 --description "New ocha-dap repos to consider ingesting" 2>/dev/null || true
          num=$(gh issue list --label kb-new-repos --state open --json number --jq '.[0].number')
          if [ -n "$num" ]; then
            cat repos-report.md | gh issue edit "$num" --body-file -
          else
            cat repos-report.md | gh issue create --title "KB: new ocha-dap repos to triage" --label kb-new-repos --body-file -
          fi

      - name: Commit advanced baseline
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add infrastructure/.repos-baseline.json
          if git diff --staged --quiet; then
            echo "no baseline change"
          else
            git commit -m "chore: advance org-repos baseline [skip ci]"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push
          fi
