name: KB hub backlog fill

# Trickles the external-frameworks enrichment backlog (D77): each run dispatches a few
# kb-ingest.yml enrichments (headless Claude web research → Opus review → PR) for pages
# still marked `extra.hub_stub`. Stateless — the stub marker + open kb-ingest/* branches
# define the queue (scripts/drain_hub_backlog.py), so nothing to commit here. At the
# default cap the ~167-stub backlog drains in ~5 weeks, Max-plan friendly.

on:
  schedule:
    - cron: "17 5 * * *"   # daily 05:17 UTC
  workflow_dispatch:
    inputs:
      cap:   { description: "max enrichments to dispatch this run", required: false, default: "5" }
      model: { description: "draft model (Opus review always runs)", required: false, default: "sonnet" }

permissions:
  contents: read
  actions: write   # to dispatch kb-ingest.yml

concurrency:
  group: hub-backlog-fill
  cancel-in-progress: false

jobs:
  fill:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with: { python-version: "3.12" }
      - run: pip install --quiet pyyaml
      - name: Drain hub backlog → dispatch kb-ingest (trickled)
        run: python scripts/drain_hub_backlog.py --cap "${{ github.event.inputs.cap || '5' }}" --model "${{ github.event.inputs.model || 'sonnet' }}"
