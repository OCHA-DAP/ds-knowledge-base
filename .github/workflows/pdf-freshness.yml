name: KB PDF freshness

# Weekly check of the *document* drift axis (companion to drift-check.yml, which
# watches code). Flags endorsed framework pages whose published PDF is aging /
# due for re-verification, with one-click ReliefWeb search links, into a single
# `kb-pdf-freshness` tracking issue. Adopting a newer version = re-run the
# ingest workflow for that framework.

on:
  schedule:
    - cron: "23 7 * * 1"   # Mondays 07:23 UTC
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write
  actions: write   # to dispatch kb-ingest.yml for due frameworks

jobs:
  freshness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install pyyaml

      - name: Check PDF freshness
        id: fresh
        continue-on-error: true   # exit 2 = something due
        run: python scripts/check_pdf_freshness.py --report pdf-report.md --emit-due due.txt

      - name: Open/update tracking issue
        if: steps.fresh.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create kb-pdf-freshness --color 0E8A16 --description "Framework PDFs due for a version re-check" 2>/dev/null || true
          num=$(gh issue list --label kb-pdf-freshness --state open --json number --jq '.[0].number')
          if [ -n "$num" ]; then
            cat pdf-report.md | gh issue edit "$num" --body-file -
            echo "Updated freshness issue #$num"
          else
            cat pdf-report.md | gh issue create --title "KB: framework PDFs due for a version re-check" --label kb-pdf-freshness --body-file -
          fi

      - name: Dispatch Claude re-ingest for due frameworks
        if: steps.fresh.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          [ -s due.txt ] || { echo "nothing due"; exit 0; }
          issue=$(gh issue list --label kb-pdf-freshness --state open --json number --jq '.[0].number')
          n=0; MAX=4   # trickle (re-ingest only refreshes the current version; adopting a NEW version is human)
          while IFS= read -r page; do
            [ -z "$page" ] && continue
            slug="$(printf '%s' "$page" | tr -c 'a-zA-Z0-9_.-' '-')"
            if [ -n "$(gh pr list --head "kb-ingest/$slug" --state open --json number --jq '.[0].number')" ]; then
              echo "skip $page (PR already open)"; continue
            fi
            [ "$n" -ge "$MAX" ] && { echo "::notice::capped at $MAX; $page deferred"; continue; }
            echo "dispatch re-ingest: $page"
            gh workflow run kb-ingest.yml -f page="$page" -f issue="${issue:-}" && n=$((n+1)) || echo "::warning::dispatch failed for $page"
          done < due.txt
