name: Refresh trigger-stats page

# Regenerates the public AA **trigger-statistics** page (activations.html) — the one part of the
# AA site that needs the DB, so it can't be rebuilt in site.yml's public deploy. It derives from
# BOTH the dev Postgres (return-period / performance stats via ocha-stratus) and framework
# frontmatter, so it refreshes daily (DB changes) AND on framework edits. The commit (no [skip ci])
# triggers site.yml, which deploys the fresh page. Same DB setup/secrets as db-schema.yml.

on:
  schedule:
    - cron: "11 7 * * *"   # 07:11 UTC daily (after the DB snapshot at 06:41)
  push:
    branches: [main]
    paths:
      - "frameworks/**"
      - "scripts/gen_trigger_performance.py"
      - "scripts/gen_trigger_site.py"
      - ".github/workflows/trigger-stats.yml"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: trigger-stats
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          pip install pyyaml
          pip install "ocha-stratus @ git+https://github.com/OCHA-DAP/ocha-stratus.git" \
            || echo "::warning::ocha-stratus install failed — check repo access / privacy"

      - name: Regenerate the trigger-stats page (dev DB + framework frontmatter)
        env:
          PGSSLMODE: require
          DSCI_AZ_DB_DEV_HOST: ${{ secrets.DSCI_AZ_DB_DEV_HOST }}
          DSCI_AZ_DB_DEV_UID: ${{ secrets.DSCI_AZ_DB_DEV_UID }}
          DSCI_AZ_DB_DEV_PW: ${{ secrets.DSCI_AZ_DB_DEV_PW }}
        run: |
          python scripts/gen_trigger_performance.py   # -> scripts/_trigger_stats_table.md (DB)
          python scripts/gen_trigger_site.py          # -> activations.html (DB + frontmatter)

      - name: Commit if changed (triggers the site deploy — no [skip ci])
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add activations.html   # the tracked output; _trigger_stats_table.md is gitignored (intermediate)
          if git diff --staged --quiet; then
            echo "trigger-stats already current — nothing to commit"
          else
            git commit -m "chore: refresh trigger-stats page (activations.html)"
            # main moves often here (concurrent auto-commits) — rebase + retry the push
            for i in 1 2 3 4 5; do
              git pull --rebase --autostash origin main && git push && { echo "pushed"; break; } || { echo "push attempt $i failed; retrying"; perl -e 'select(undef,undef,undef,5)'; }
            done
          fi
